server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vite produces content-hashed filenames — cache aggressively.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached so users always get the latest deploy.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Health check used by the ALB target group.
    location = /up {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # All other paths: serve the file if it exists, otherwise hand off to
    # index.html so TanStack Router handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
