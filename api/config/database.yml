default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: shape_shack_development

test:
  <<: *default
  database: shape_shack_test

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>
